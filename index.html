    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-code"></i> MySite</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">Головна</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Про нас</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Контакти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">

    <div class="page-header">
        <h1>Bootstrap Еспериментальна сторiнка</h1>
        <p>Червоно-чорний градєнт та неонова пiдсвiтка</p>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <ul class="nav nav-pills nav-justified custom-nav-pills">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Пункт 1</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Пункт 2</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Пункт 3</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-lg-6">
            <div class="glass-panel h-100">
                <h4 class="mb-4 text-danger"><i class="fas fa-user-circle"></i> Авторизація</h4>
                <form>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Ім'я користувача">
                        </div>
                        <div class="col-md-6">
                            <input type="password" class="form-control" placeholder="Пароль">
                        </div>
                    </div>
                    <button type="button" class="btn btn-custom-red btn-lg">
                        <i class="fas fa-paper-plane"></i> Увiйти в аккаунт
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="glass-panel h-100">
                <h4 class="mb-4 text-danger"><i class="fas fa-cog"></i> Додаткові опції</h4>

                <label class="form-label" style="color: #ffcccc;">Виберіть рівень доступу:</label>
                <select class="form-select mb-4">
                    <option selected>Опція 1 (Стандарт)</option>
                    <option value="2">Опція 2 (Адміністратор)</option>
                    <option value="3">Опція 3 (Гість)</option>
                </select>

                <hr style="border-color: rgba(255, 26, 26, 0.5);">

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <div>
                        <button class="btn btn-outline-danger me-2">Скинути</button>
                        <button class="btn btn-warning">Увага!</button>
                    </div>
                    <div>
                        <span class="badge bg-danger fs-6">Bootstrap V5</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
